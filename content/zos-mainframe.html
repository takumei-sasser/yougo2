<!DOCTYPE html>
<html lang="ja">
<head>

    <link rel="stylesheet" href="../style.css">
    <script src="../mermaid.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            mermaid.initialize({ 
                startOnLoad: true, 
                theme: 'neutral',
                securityLevel: 'loose'
            });
            mermaid.init();
        });

</head>

</body>
</html>
