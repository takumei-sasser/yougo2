<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <script src="../mermaid.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            mermaid.initialize({ 
                startOnLoad: true, 
                theme: 'neutral',
                securityLevel: 'loose'
            });
            mermaid.init();
        });
    </script>
</head>
<body class="is-iframe">
    <h1>TSO/E</h1>
    <p>Time Sharing Option / Extensions。複数のユーザーが端末から対話形式でz/OSを利用できるようにする機能です。</p>
    
</body>
</html>
