<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <script src="../mermaid.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            mermaid.initialize({ 
                startOnLoad: true, 
                theme: 'neutral',
                securityLevel: 'loose'
            });
            mermaid.init();
        });
    </script>
</head>

    <h1>HSA</h1>
    <p>Hardware System Area。ハードウェア構成情報などを格納するためのメインメモリ内の予約済み領域。</p>
    
</body>
</html>
