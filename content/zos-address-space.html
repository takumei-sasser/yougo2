<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <script src="../mermaid.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            mermaid.initialize({ 
                startOnLoad: true, 
                theme: 'neutral',
                securityLevel: 'loose'
            });
            mermaid.init();
        });
    </script>
</head>
<body class="is-iframe">
    <h1>Address Space</h1>
    <p>各プログラムが利用可能な論理的なメモリ空間（通常2GB、4GB、16EBと拡張されている）。</p>
    
    <div class="mermaid">
    graph TD
    AS[Address Space] --> Common[Common Area]
    AS --> Private[Private Area]
    AS --> Epriv[Extended Private Area]
    </div>

</body>
</html>
