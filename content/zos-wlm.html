<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <script src="../mermaid.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            mermaid.initialize({ 
                startOnLoad: true, 
                theme: 'neutral',
                securityLevel: 'loose'
            });
            mermaid.init();
        });
    </script>
</head>
<body class="is-iframe">
    <h1>WLM</h1>
    <p>Workload Manager。ビジネスの優先順位（サービスレベル）に基づき、CPUやメモリなどのシステム資源を動的に配分する機能。</p>
    
</body>
</html>
